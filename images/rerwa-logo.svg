<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="RERWA">
  <defs>
    <style>
      .navy { fill: #1a2350; }
      .gold { fill: #b8862f; }
      .wordmark {
        font-family: "Cormorant Garamond", "Trajan Pro", "EB Garamond", Georgia, serif;
        font-weight: 500;
        font-size: 128px;
        letter-spacing: 18px;
        fill: #1a2350;
      }
      .tagline {
        font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
        font-weight: 500;
        font-size: 22px;
        letter-spacing: 8px;
        fill: #b8862f;
      }
    </style>
  </defs>

  <!-- Ascending mark: two nested chevrons -->
  <!-- Outer navy chevron -->
  <path class="navy" d="M400 170 L620 430 L560 430 L400 240 L240 430 L180 430 Z"/>
  <!-- Inner gold chevron -->
  <path class="gold" d="M400 320 L560 510 L500 510 L400 390 L300 510 L240 510 Z"/>

  <!-- Wordmark -->
  <text class="wordmark" x="400" y="640" text-anchor="middle">RERWA</text>

  <!-- Tagline -->
  <text class="tagline" x="400" y="700" text-anchor="middle">PRINCIPLED PEOPLE · MEANINGFUL LIVES</text>
</svg>
